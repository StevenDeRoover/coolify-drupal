services:
  drupal:
    build:
      context: .
      dockerfile: Dockerfile

    environment:
      - DB_HOST=postgres
      - DB_NAME=drupal
      - DB_USER=postgres
      - DB_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - DB_PORT=5432

    
    depends_on:
      - postgres

    volumes:
      - drupal_modules:/var/www/html/web/modules
      - drupal_profiles:/var/www/html/web/profiles
      - drupal_themes:/var/www/html/web/themes
      - drupal_sites:/var/www/html/web/sites

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16

    environment:
      - POSTGRES_DB=drupal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 20

volumes:
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  postgres_data: